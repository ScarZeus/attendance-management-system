<div class="dashboard-container">
  <div class="dash-card">

    <div class="user-section">
      <img
        src="user.png"
        alt="user-icon"
        id="user-img"
        (error)="$any($event.target).src='https://ui-avatars.com/api/?name=' + credentials.name + '&background=4f46e5&color=fff'"
      />
      <h2>{{ credentials.name || 'N/A' }}</h2>
      <p class="department">{{ credentials.department || 'N/A' }}</p>

      <div class="attendance-dropdown">
        <button class="mark-btn" (click)="toggleDropdown($event)">
          Mark Attendance ▼
        </button>
        <div class="dropdown-menu" *ngIf="dropdownOpen">
          <div (click)="openForm($event, 'PRESENT')">Full Day</div>
          <div (click)="openForm($event, 'HALF_DAY')">Half Day</div>
          <div (click)="openForm($event, 'ABSENT')">Absent</div>
          <div (click)="openForm($event, 'WFH')">Work From Home</div>
        </div>
      </div>

      <button class="view-btn">View This Month Attendance</button>
    </div>

    <div class="details">
      <div class="floating-display">
        <span class="floating-label">EMP ID</span>
        <div class="value">{{ credentials.emp_id || 'N/A' }}</div>
      </div>
      <div class="floating-display">
        <span class="floating-label">Name</span>
        <div class="value">{{ credentials.name || 'N/A' }}</div>
      </div>
      <div class="floating-display">
        <span class="floating-label">Email</span>
        <div class="value">{{ credentials.email || 'N/A' }}</div>
      </div>
      <div class="floating-display">
        <span class="floating-label">Department</span>
        <div class="value">{{ credentials.department || 'N/A' }}</div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" *ngIf="showModal">
  <div class="modal" (click)="$event.stopPropagation()">
    <h3>Mark Attendance</h3>

    <form (ngSubmit)="submitAttendance()">

      <div class="form-field">
        <label>Status</label>
        <select [(ngModel)]="attendance.status" name="status" (change)="onStatusChange()">
          <option value="PRESENT">Present</option>
          <option value="HALF_DAY">Half Day</option>
          <option value="ABSENT">Absent</option>
          <option value="WFH">Work From Home</option>
        </select>
      </div>

      <div class="form-field">
        <label>Date</label>
        <input type="text" [value]="todayDate" disabled />
      </div>

      <div class="form-field" *ngIf="showCheckin">
        <label>Check In</label>
        <input type="time" [(ngModel)]="attendance.check_in" name="check_in" />
      </div>

      <div class="form-field" *ngIf="showCheckin">
        <label>Check Out</label>
        <input type="time" [(ngModel)]="attendance.check_out" name="check_out" />
      </div>

      <div class="form-field" *ngIf="showReason">
        <label>Reason</label>
        <textarea [(ngModel)]="attendance.reason" name="reason" rows="3"></textarea>
      </div>

      <div class="modal-buttons">
        <button type="submit">Submit</button>
        <button type="button" (click)="closeModal()">Cancel</button>
      </div>

    </form>
  </div>
</div>
