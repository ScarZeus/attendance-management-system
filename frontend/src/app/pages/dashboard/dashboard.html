<div class="page">
  <h1>Employee Dashboard</h1>

  <div class="info-box">
    <p><strong>Name:</strong> {{ credentials.name || 'N/A' }}</p>
    <p><strong>Emp ID:</strong> {{ credentials.emp_id || 'N/A' }}</p>
    <p><strong>Department:</strong> {{ credentials.department || 'N/A' }}</p>
    <p><strong>Role:</strong> {{ credentials.role || 'N/A' }}</p>
  </div>

  <div class="msg success" *ngIf="messageType === 'success'">{{ message }}</div>
  <div class="msg error" *ngIf="messageType === 'error'">{{ message }}</div>

  <div class="btn-group">
    <button class="btn btn-green" (click)="checkIn()"> Check In</button>
    <button class="btn btn-red" (click)="checkOut()"> Check Out</button>
    <button class="btn btn-blue" (click)="goLeave()"> Apply Leave</button>
    <button class="btn btn-orange" (click)="goWfh()"> Apply WFH</button>
  </div>

  <div class="btn-group secondary">
    <button class="btn btn-gray" (click)="goAttendance()">View Attendance</button>
    <button class="btn btn-gray" (click)="goHr()" *ngIf="credentials.role === 'HR'">HR Dashboard</button>
  </div>
</div>
