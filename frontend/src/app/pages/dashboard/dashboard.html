<div class="dashboard-container">
  <div class="dash-card">
    <div class="user-section">
      <img src="user.png" alt="user-icon" id="user-img" />
      <h2>{{ credentials.name || 'N/A' }}</h2>
      <p class="department">{{ credentials.department || 'N/A' }}</p>

      <div class="action-buttons">
        <button class="action-btn checkin-btn" (click)="openForm($event, 'CHECKIN')">Check In</button>
        <button class="action-btn checkout-btn" (click)="openForm($event, 'CHECKOUT')">Check Out</button>
        <button class="action-btn halfday-btn" (click)="openForm($event, 'HALF_DAY')">Half Day</button>
        <button class="action-btn leave-btn" (click)="openForm($event, 'LEAVE')">Apply Leave</button>
        <button class="action-btn wfh-btn" (click)="openForm($event, 'WFH')">Work From Home</button>
      </div>

      <button class="view-btn" (click)="view_attendance()">View This Month Attendance</button>
    </div>

    <div class="details">
      <div class="floating-display">
        <span class="floating-label">EMP ID</span>
        <div class="value">{{ credentials.emp_id || 'N/A' }}</div>
      </div>
      <div class="floating-display">
        <span class="floating-label">Name</span>
        <div class="value">{{ credentials.name || 'N/A' }}</div>
      </div>
      <div class="floating-display">
        <span class="floating-label">Email</span>
        <div class="value">{{ credentials.email || 'N/A' }}</div>
      </div>
      <div class="floating-display">
        <span class="floating-label">Department</span>
        <div class="value">{{ credentials.department || 'N/A' }}</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" *ngIf="showModal">
  <div class="modal" (click)="$event.stopPropagation()">
    <h3>{{ modalTitle }}</h3>
    <form (ngSubmit)="submitAttendance()">

      <div class="form-field">
        <label>Date</label>
        <input type="text" [value]="todayDate" disabled />
      </div>

      <div class="form-field" *ngIf="showCheckin">
        <label>Check In Time</label>
        <input type="time" [(ngModel)]="attendance.check_in" name="check_in" required />
      </div>

      <div class="form-field" *ngIf="showCheckout">
        <label>Check Out Time</label>
        <input type="time" [(ngModel)]="attendance.check_out" name="check_out" required />
      </div>

      <div class="form-field" *ngIf="showDateRange">
        <label>From Date</label>
        <input type="date" name="from_date" [(ngModel)]="attendance.from_date" required />
      </div>

      <div class="form-field" *ngIf="showDateRange">
        <label>To Date</label>
        <input type="date" name="to_date" [(ngModel)]="attendance.to_date" required />
      </div>

      <div class="form-field" *ngIf="showReason">
        <label>Reason</label>
        <textarea [(ngModel)]="attendance.reason" name="reason" rows="3" required></textarea>
      </div>

      <div class="modal-buttons">
        <button type="submit">Submit</button>
        <button type="button" (click)="closeModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>
